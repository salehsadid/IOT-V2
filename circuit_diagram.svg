<svg width="1000" height="700" xmlns="http://www.w3.org/2000/svg" style="background-color: white; font-family: Arial, sans-serif;">
    <!-- Title -->
    <text x="500" y="50" font-size="28" font-weight="bold" text-anchor="middle">System Hardware Schematic Diagram</text>
    
    <!-- ESP32 -->
    <rect x="100" y="120" width="200" height="420" fill="#f4f4f9" stroke="#333" stroke-width="2" rx="10"/>
    <text x="200" y="160" font-size="20" font-weight="bold" text-anchor="middle">ESP32 Dev Board</text>
    
    <!-- ESP32 Pins -->
    <text x="290" y="215" font-size="14" font-weight="bold" text-anchor="end">3.3V</text>
    <circle cx="300" cy="210" r="5" fill="#e74c3c"/>
    
    <text x="290" y="275" font-size="14" font-weight="bold" text-anchor="end">GND</text>
    <circle cx="300" cy="270" r="5" fill="#2c3e50"/>
    
    <text x="290" y="335" font-size="14" font-weight="bold" text-anchor="end">GPIO 21 (SDA)</text>
    <circle cx="300" cy="330" r="5" fill="#3498db"/>
    
    <text x="290" y="395" font-size="14" font-weight="bold" text-anchor="end">GPIO 22 (SCL)</text>
    <circle cx="300" cy="390" r="5" fill="#27ae60"/>
    
    <text x="290" y="455" font-size="14" font-weight="bold" text-anchor="end">GPIO 25 (Signal)</text>
    <circle cx="300" cy="450" r="5" fill="#9b59b6"/>
    
    <!-- MPU6050 Hand -->
    <rect x="650" y="100" width="180" height="130" fill="#eaf2f8" stroke="#333" stroke-width="2" rx="8"/>
    <text x="740" y="125" font-size="16" font-weight="bold" text-anchor="middle">Hand MPU6050</text>
    
    <!-- Hand Pins -->
    <circle cx="650" cy="140" r="4" fill="#e74c3c"/>
    <text x="665" y="145" font-size="13">VCC (3.3V)</text>
    
    <circle cx="650" cy="165" r="4" fill="#2c3e50"/>
    <text x="665" y="170" font-size="13">GND</text>
    
    <circle cx="650" cy="190" r="4" fill="#3498db"/>
    <text x="665" y="195" font-size="13">SDA</text>
    
    <circle cx="650" cy="215" r="4" fill="#27ae60"/>
    <text x="665" y="220" font-size="13">SCL</text>
    
    <!-- AD0 Pin Hand -->
    <circle cx="830" cy="170" r="4" fill="#2c3e50"/>
    <text x="820" y="175" font-size="13" font-weight="bold" text-anchor="end">AD0</text>
    <path d="M 830 170 L 880 170 L 880 155" stroke="#2c3e50" stroke-width="2" fill="none"/>
    <text x="880" y="145" font-size="13" font-weight="bold" text-anchor="middle">to GND (0x68)</text>

    <!-- Leg MPU6050 -->
    <rect x="650" y="260" width="180" height="130" fill="#eaf2f8" stroke="#333" stroke-width="2" rx="8"/>
    <text x="740" y="285" font-size="16" font-weight="bold" text-anchor="middle">Leg MPU6050</text>
    
    <!-- Leg Pins -->
    <circle cx="650" cy="300" r="4" fill="#e74c3c"/>
    <text x="665" y="305" font-size="13">VCC (3.3V)</text>
    
    <circle cx="650" cy="325" r="4" fill="#2c3e50"/>
    <text x="665" y="330" font-size="13">GND</text>
    
    <circle cx="650" cy="350" r="4" fill="#3498db"/>
    <text x="665" y="355" font-size="13">SDA</text>
    
    <circle cx="650" cy="375" r="4" fill="#27ae60"/>
    <text x="665" y="380" font-size="13">SCL</text>
    
    <!-- AD0 Pin Leg -->
    <circle cx="830" cy="330" r="4" fill="#e74c3c"/>
    <text x="820" y="335" font-size="13" font-weight="bold" text-anchor="end">AD0</text>
    <path d="M 830 330 L 880 330 L 880 315" stroke="#e74c3c" stroke-width="2" fill="none"/>
    <text x="880" y="305" font-size="13" font-weight="bold" text-anchor="middle" fill="#e74c3c">to 3.3V (0x69)</text>

    <!-- OLED -->
    <rect x="650" y="420" width="180" height="120" fill="#fcf3cf" stroke="#333" stroke-width="2" rx="8"/>
    <text x="740" y="445" font-size="16" font-weight="bold" text-anchor="middle">OLED Display</text>
    
    <!-- OLED Pins -->
    <circle cx="650" cy="460" r="4" fill="#e74c3c"/>
    <text x="665" y="465" font-size="13">VCC (3.3V)</text>
    
    <circle cx="650" cy="485" r="4" fill="#2c3e50"/>
    <text x="665" y="490" font-size="13">GND</text>
    
    <circle cx="650" cy="510" r="4" fill="#3498db"/>
    <text x="665" y="515" font-size="13">SDA</text>
    
    <circle cx="650" cy="535" r="4" fill="#27ae60"/>
    <text x="665" y="540" font-size="13">SCL</text>

    <!-- Buzzer -->
    <rect x="650" y="570" width="180" height="90" fill="#f5eef8" stroke="#333" stroke-width="2" rx="8"/>
    <text x="740" y="595" font-size="16" font-weight="bold" text-anchor="middle">Active Buzzer</text>
    
    <!-- Buzzer Pins -->
    <circle cx="650" cy="610" r="4" fill="#2c3e50"/>
    <text x="665" y="615" font-size="13">GND</text>
    
    <circle cx="650" cy="640" r="4" fill="#9b59b6"/>
    <text x="665" y="645" font-size="13">I/O (Signal)</text>

    <!-- WIRING LINES -->
    
    <!-- 3.3V Bus (Red) -->
    <path d="M 300 210 L 590 210 L 590 140 L 650 140" stroke="#e74c3c" stroke-width="3" fill="none"/>
    <path d="M 590 210 L 590 300 L 650 300" stroke="#e74c3c" stroke-width="3" fill="none"/>
    <path d="M 590 300 L 590 460 L 650 460" stroke="#e74c3c" stroke-width="3" fill="none"/>

    <!-- GND Bus (Black) -->
    <path d="M 300 270 L 550 270 L 550 165 L 650 165" stroke="#2c3e50" stroke-width="3" fill="none"/>
    <path d="M 550 270 L 550 325 L 650 325" stroke="#2c3e50" stroke-width="3" fill="none"/>
    <path d="M 550 325 L 550 485 L 650 485" stroke="#2c3e50" stroke-width="3" fill="none"/>
    <path d="M 550 485 L 550 610 L 650 610" stroke="#2c3e50" stroke-width="3" fill="none"/>

    <!-- SDA Bus (Blue) -->
    <path d="M 300 330 L 510 330 L 510 190 L 650 190" stroke="#3498db" stroke-width="3" fill="none"/>
    <path d="M 510 330 L 510 350 L 650 350" stroke="#3498db" stroke-width="3" fill="none"/>
    <path d="M 510 350 L 510 510 L 650 510" stroke="#3498db" stroke-width="3" fill="none"/>

    <!-- SCL Bus (Green) -->
    <path d="M 300 390 L 470 390 L 470 215 L 650 215" stroke="#27ae60" stroke-width="3" fill="none"/>
    <path d="M 470 390 L 470 375 L 650 375" stroke="#27ae60" stroke-width="3" fill="none"/>
    <path d="M 470 390 L 470 535 L 650 535" stroke="#27ae60" stroke-width="3" fill="none"/>

    <!-- Buzzer Signal (Purple) -->
    <path d="M 300 450 L 430 450 L 430 640 L 650 640" stroke="#9b59b6" stroke-width="3" fill="none"/>
    
    <!-- Legend -->
    <rect x="50" y="600" width="200" height="80" fill="#fff" stroke="#ccc" stroke-width="1"/>
    <text x="60" y="620" font-size="12" font-weight="bold">Legend / Wire Colors:</text>
    <text x="60" y="640" font-size="12" fill="#e74c3c">Red: 3.3V Power</text>
    <text x="160" y="640" font-size="12" fill="#3498db">Blue: SDA (Data)</text>
    <text x="60" y="660" font-size="12" fill="#2c3e50">Black: GND</text>
    <text x="160" y="660" font-size="12" fill="#27ae60">Green: SCL (Clock)</text>
    
</svg>
