<svg width="1150" height="850" xmlns="http://www.w3.org/2000/svg" style="background-color: white; font-family: 'Segoe UI', Arial, sans-serif;">
    
    <!-- Title -->
    <text x="575" y="50" font-size="32" font-weight="bold" fill="#2c3e50" text-anchor="middle">Full System Architecture Diagram</text>
    
    <!-- Zone 1: Patient Side -->
    <rect x="50" y="100" width="380" height="700" fill="#f8f9fa" stroke="#ced4da" stroke-width="3" rx="15" stroke-dasharray="8,4"/>
    <text x="240" y="145" font-size="24" font-weight="bold" fill="#343a40" text-anchor="middle">Patient / Wearable Device</text>
    
    <!-- Sensors -->
    <rect x="100" y="180" width="130" height="80" fill="#eaf2f8" stroke="#3498db" stroke-width="2" rx="8"/>
    <text x="165" y="220" font-size="15" font-weight="bold" text-anchor="middle">Hand MPU6050</text>
    <text x="165" y="240" font-size="13" fill="#7f8c8d" text-anchor="middle">I2C (0x68)</text>

    <rect x="250" y="180" width="130" height="80" fill="#eaf2f8" stroke="#3498db" stroke-width="2" rx="8"/>
    <text x="315" y="220" font-size="15" font-weight="bold" text-anchor="middle">Leg MPU6050</text>
    <text x="315" y="240" font-size="13" fill="#7f8c8d" text-anchor="middle">I2C (0x69)</text>

    <!-- ESP32 Main -->
    <rect x="100" y="330" width="280" height="160" fill="#ebf5fb" stroke="#2980b9" stroke-width="3" rx="10"/>
    <text x="240" y="370" font-size="22" font-weight="bold" fill="#2980b9" text-anchor="middle">ESP32 Controller</text>
    <text x="240" y="395" font-size="15" text-anchor="middle">Edge Computing &amp; Logic</text>
    
    <rect x="120" y="420" width="110" height="55" fill="#d4e6f1" stroke="#2980b9" stroke-width="1" rx="5"/>
    <text x="175" y="442" font-size="13" font-weight="bold" text-anchor="middle">Tremor Logic</text>
    <text x="175" y="460" font-size="11" text-anchor="middle">Thresholds</text>

    <rect x="250" y="420" width="110" height="55" fill="#d4e6f1" stroke="#2980b9" stroke-width="1" rx="5"/>
    <text x="305" y="442" font-size="13" font-weight="bold" text-anchor="middle">FOG Logic</text>
    <text x="305" y="460" font-size="11" text-anchor="middle">State Machine</text>

    <!-- Actuators/Output -->
    <rect x="100" y="580" width="130" height="80" fill="#fcf3cf" stroke="#f39c12" stroke-width="2" rx="8"/>
    <text x="165" y="620" font-size="15" font-weight="bold" text-anchor="middle">OLED Display</text>
    <text x="165" y="640" font-size="13" fill="#7f8c8d" text-anchor="middle">Status Output</text>

    <rect x="250" y="580" width="130" height="80" fill="#f5eef8" stroke="#8e44ad" stroke-width="2" rx="8"/>
    <text x="315" y="620" font-size="15" font-weight="bold" text-anchor="middle">Active Buzzer</text>
    <text x="315" y="640" font-size="13" fill="#7f8c8d" text-anchor="middle">Rhythmic Cueing</text>


    <!-- Zone 2: Server Side -->
    <rect x="730" y="100" width="370" height="420" fill="#f8f9fa" stroke="#ced4da" stroke-width="3" rx="15" stroke-dasharray="8,4"/>
    <text x="915" y="145" font-size="24" font-weight="bold" fill="#343a40" text-anchor="middle">Web Server (Local)</text>
    
    <!-- Laravel -->
    <rect x="770" y="180" width="290" height="150" fill="#fdedec" stroke="#e74c3c" stroke-width="3" rx="10"/>
    <text x="915" y="220" font-size="22" font-weight="bold" fill="#c0392b" text-anchor="middle">Laravel Application</text>
    
    <rect x="790" y="250" width="110" height="50" fill="#fadbd8" stroke="#e74c3c" stroke-width="1" rx="5"/>
    <text x="845" y="280" font-size="14" font-weight="bold" text-anchor="middle">REST API</text>

    <rect x="930" y="250" width="110" height="50" fill="#fadbd8" stroke="#e74c3c" stroke-width="1" rx="5"/>
    <text x="985" y="280" font-size="14" font-weight="bold" text-anchor="middle">Dashboard</text>

    <!-- MySQL -->
    <rect x="770" y="380" width="290" height="110" fill="#e8f8f5" stroke="#1abc9c" stroke-width="3" rx="10"/>
    <text x="915" y="430" font-size="20" font-weight="bold" fill="#16a085" text-anchor="middle">MySQL Database</text>
    <text x="915" y="455" font-size="13" fill="#34495e" text-anchor="middle">Tables: Patients, Events, Users</text>


    <!-- Zone 3: Caregivers / Users -->
    <rect x="730" y="550" width="370" height="250" fill="#f8f9fa" stroke="#ced4da" stroke-width="3" rx="15" stroke-dasharray="8,4"/>
    <text x="915" y="595" font-size="24" font-weight="bold" fill="#343a40" text-anchor="middle">Caregivers &amp; Doctors</text>

    <rect x="750" y="630" width="150" height="110" fill="#fef9e7" stroke="#f1c40f" stroke-width="2" rx="8"/>
    <text x="825" y="680" font-size="15" font-weight="bold" text-anchor="middle">Web Browser</text>
    <text x="825" y="700" font-size="13" fill="#7f8c8d" text-anchor="middle">Live Monitoring</text>

    <rect x="930" y="630" width="150" height="110" fill="#e8f6f3" stroke="#16a085" stroke-width="2" rx="8"/>
    <text x="1005" y="680" font-size="15" font-weight="bold" text-anchor="middle">Telegram App</text>
    <text x="1005" y="700" font-size="13" fill="#7f8c8d" text-anchor="middle">Push Alerts</text>


    <!-- CONNECTIONS & ARROWS -->

    <!-- MPU to ESP32 -->
    <path d="M 165 260 L 165 330" stroke="#3498db" stroke-width="3" fill="none" marker-end="url(#arrow-blue)"/>
    <path d="M 315 260 L 315 330" stroke="#3498db" stroke-width="3" fill="none" marker-end="url(#arrow-blue)"/>
    <text x="240" y="295" font-size="13" fill="#2980b9" font-weight="bold" text-anchor="middle">I2C Data Lines</text>

    <!-- ESP32 to OLED/Buzzer -->
    <path d="M 165 490 L 165 580" stroke="#f39c12" stroke-width="3" fill="none" marker-end="url(#arrow-orange)"/>
    <path d="M 315 490 L 315 580" stroke="#8e44ad" stroke-width="3" fill="none" marker-end="url(#arrow-purple)"/>

    <!-- ORTHOGONAL NETWORK CONNECTIONS TO AVOID OVERLAPPING -->
    
    <!-- Wi-Fi POST (ESP32 to Laravel API) - Routing Upwards -->
    <path d="M 380 370 Q 555 260 770 260" stroke="#e67e22" stroke-width="4" stroke-dasharray="8,6" fill="none" marker-end="url(#arrow-orange-large)"/>
    <!-- Text perfectly placed above the arc -->
    <text x="560" y="280" font-size="15" font-weight="bold" fill="#d35400" text-anchor="middle">Wi-Fi (HTTP POST)</text>
    <text x="560" y="300" font-size="13" fill="#e67e22" text-anchor="middle">Heartbeats &amp; Events</text>

    <!-- Wi-Fi Poll (Laravel API to ESP32) - Routing Downwards -->
    <path d="M 770 290 Q 555 450 380 440" stroke="#27ae60" stroke-width="4" stroke-dasharray="8,6" fill="none" marker-end="url(#arrow-green-large)"/>
    <!-- Text perfectly placed below the arc -->
    <text x="560" y="445" font-size="15" font-weight="bold" fill="#27ae60" text-anchor="middle">Wi-Fi (HTTP Response)</text>
    <text x="560" y="465" font-size="13" fill="#2ecc71" text-anchor="middle">Stop Buzzer Command</text>

    <!-- Laravel to MySQL -->
    <path d="M 915 330 L 915 380" stroke="#34495e" stroke-width="3" fill="none" marker-end="url(#arrow-dark)"/>
    <path d="M 890 380 L 890 330" stroke="#34495e" stroke-width="3" fill="none" marker-end="url(#arrow-dark)"/>
    <text x="965" y="360" font-size="14" font-weight="bold" fill="#34495e" text-anchor="middle">Read/Write</text>

    <!-- Laravel Dashboard to Browser -->
    <path d="M 900 490 L 850 630" stroke="#f39c12" stroke-width="3" fill="none" marker-end="url(#arrow-orange)"/>
    <!-- Positioned to the left of the arrow -->
    <text x="825" y="555" font-size="14" font-weight="bold" fill="#d35400" text-anchor="end">HTTP/UI</text>

    <!-- Browser to Laravel Dashboard (Command) -->
    <path d="M 825 630 L 875 490" stroke="#2980b9" stroke-width="3" fill="none" marker-end="url(#arrow-blue)"/>
    
    <!-- Laravel API to Telegram -->
    <path d="M 940 490 L 990 630" stroke="#16a085" stroke-width="4" stroke-dasharray="8,6" fill="none" marker-end="url(#arrow-green)"/>
    <!-- Positioned to the right of the arrow -->
    <text x="1005" y="555" font-size="14" font-weight="bold" fill="#16a085" text-anchor="start">HTTPS POST</text>


    <!-- Markers / Arrowheads -->
    <defs>
        <marker id="arrow-blue" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
            <path d="M 0 0 L 10 5 L 0 10 z" fill="#2980b9"/>
        </marker>
        <marker id="arrow-orange" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
            <path d="M 0 0 L 10 5 L 0 10 z" fill="#f39c12"/>
        </marker>
        <marker id="arrow-orange-large" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto">
            <path d="M 0 0 L 10 5 L 0 10 z" fill="#e67e22"/>
        </marker>
        <marker id="arrow-green" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
            <path d="M 0 0 L 10 5 L 0 10 z" fill="#16a085"/>
        </marker>
        <marker id="arrow-green-large" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto">
            <path d="M 0 0 L 10 5 L 0 10 z" fill="#27ae60"/>
        </marker>
        <marker id="arrow-purple" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
            <path d="M 0 0 L 10 5 L 0 10 z" fill="#8e44ad"/>
        </marker>
        <marker id="arrow-dark" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
            <path d="M 0 0 L 10 5 L 0 10 z" fill="#34495e"/>
        </marker>
    </defs>

</svg>
